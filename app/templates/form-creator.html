{% extends 'base.html' %}
<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="utf-8">
        <meta name = "viewport" content="width=device-width, initial-scale=1.0">
        <!-- <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}"> -->
        <link rel="stylesheet" href="../static/css/styles.css">
        <!--
        Client Side script controlls the addition of questions and
        sending the questions objext to the server upon submission
        -->
        <script src="../static/js/form-creator.js" defer></script>   
        <!-- <script src="{{ url_for('static', filename='js/form-creator.js') }}" defer></script> -->
    </head>
    <body>
        <!-- {% block body %} -->
        <div class="assignment-box">
            <div class="question" id ="sample-question">
                <p class="questionDescription">
                    question description
                </p>
                <p class="errorSolution">
                    solution error containing
                </p>
                
                <label>
                    Describe the error in the solution
                    <input class="questionInputField" type="text/plain" name="questionInputField">
                </label>
              
            </div>
        </div>
        <!--
        the assignment editor has fields for question descriptions, answers, and media. 
        
        -->
        <div class="assignment-editor">
            <label for="questionDescriptionField">Description
                <input class="questionDescriptionField" type="text" id="questionDescriptionField">
            </label>
            <label for="questionMediaField" > 
                Media
                <input class="questionMediaField" type="image" id="questionMediaField">
             </label>
            <label for="questionAnswerField"> 
                Erronous Answer  (will be generated by LLM)
                <input class="questionAnswerField" type="text" id="questionAnswerField">
            </label>
            <button type="button" class="editorSubmit" onclick="generateAssignment()">
                Add question
            </button>
            <label for="questionRemoveField">question to remove
                <input class="questionRemoveField" type="text" id="questionRemoveField">
            </label>
            <button type="button" class="editorUndo" onclick="removeQuestion()">
                Remove question
            </button>
        </div>
        <!-- {% endblock %} -->
    </body>
</html>
